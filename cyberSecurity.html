<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚨 Alarm PIN Setup</title>
<style>
    :root {
        --bg: #f6f8fc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(15, 23, 42, 0.10);
        --shadow: 0 14px 30px rgba(2, 6, 23, 0.08);
        --primary: #2563eb;
        --primary-2: #1d4ed8;
        --ring: rgba(37, 99, 235, 0.35);
    }

    * { box-sizing: border-box; }

    body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 10% 0%, #eaf1ff 0%, transparent 55%),
                    radial-gradient(900px 600px at 90% 10%, #e9fff5 0%, transparent 60%),
                    var(--bg);
        margin: 0;
        padding: 24px;
        color: var(--text);
    }

    .wrap {
        max-width: 1100px;
        margin: 0 auto;
    }

    /* Page header */
    .page-header {
        text-align: center;
        margin: 10px auto 16px;
    }

    .page-header h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 30px);
        letter-spacing: -0.02em;
    }

    .page-header .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
    }

    /* Navigation */
    .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 14px 0 22px;
        padding: 10px;
        background: rgba(255,255,255,0.65);
        border: 1px solid var(--border);
        border-radius: 14px;
        backdrop-filter: blur(8px);
    }

    .nav a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #0b1220;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1;
        border: 1px solid rgba(255,255,255,0.12);
        transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    .nav a:hover {
        transform: translateY(-1px);
        background: #111a2b;
    }

    .nav a.primary {
        background: var(--primary);
        border-color: rgba(255,255,255,0.18);
    }

    .nav a.primary:hover {
        background: var(--primary-2);
    }

    .nav a.active {
        box-shadow: 0 0 0 3px var(--ring);
    }

    /* Card */
    .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 22px rgba(2, 6, 23, 0.06);
        max-width: 520px;
        margin: 0 auto;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(15, 23, 42, 0.14);
        background: #fff;
        font-size: 14px;
        outline: none;
        text-align: center;
        transition: box-shadow 0.12s ease, border-color 0.12s ease;
        margin-bottom: 10px;
    }

    input:focus {
        border-color: rgba(37, 99, 235, 0.6);
        box-shadow: 0 0 0 3px var(--ring);
    }

    button {
        width: 100%;
        padding: 10px 12px;
        background: var(--primary);
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 700;
        transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
        transform: translateY(-1px);
        background: var(--primary-2);
        box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
    }

    p {
        color: var(--muted);
    }
</style>
</head>
<body>

<div class="wrap">
    <div class="page-header">
        <h1>🚨 Alarm PIN Setup</h1>
        <p class="subtitle">You are on: Alarm PIN Setup</p>
    </div>

    <nav class="nav" aria-label="Site navigation">
        <a class="primary" href="full_form.html">Back to Dashboard</a>
        <a href="Index.html">📹 Security Camera</a>
        <a href="Automation.html">💡 Smart Lighting</a>
        <a class="active" aria-current="page" href="cyberSecurity.html">🚨 Alarm PIN Setup</a>
    </nav>

    <div class="card">
        <h2>Алармена система</h2>
        <p>Въведете 4-цифров PIN код:</p>
        <form onsubmit="return checkPin(this)">
            <input type="password" placeholder="Въведете парола" maxlength="4" pattern="[0-9]{4}" required
                oninvalid="this.setCustomValidity('Пробвай ей тва 0000')"
                oninput="this.setCustomValidity('')">
            <button type="submit">Запази PIN</button>
        </form>
    </div>
</div>

</body>
</html>
