<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Security - Light Mode</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 flex">

<!-- SIDEBAR -->
<aside class="w-60 bg-white border-r border-gray-200 min-h-screen p-5 shadow-sm">

    <h2 class="text-lg font-bold text-blue-600 mb-6">
        🏠 Smart IoT
    </h2>

    <nav class="space-y-2 text-sm">
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition">
            📹 Camera
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition">
            🔐 Smart Lock
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition">
            🌡️ Thermostat
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition">
            💡 Lighting
        </a>
        <a href="#" class="block px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition">
            🚨 Alarm
        </a>
    </nav>

</aside>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center shadow-sm">

        <h1 class="text-lg font-semibold text-gray-700">
            Camera API Access
        </h1>

        <span class="text-green-600 text-sm font-semibold">
            ● System Online
        </span>

    </header>

    <!-- CONTENT -->
    <main class="p-6 flex justify-center">

        <div class="w-full max-w-lg bg-white border border-gray-200 p-6 rounded-2xl shadow-md">

            <h2 class="text-center text-xl font-bold text-blue-600 mb-5">
                📹 Camera Authorization
            </h2>

            <form id="apiForm" class="space-y-4">

                <input type="text" id="username" placeholder="Username"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

                <input type="password" id="password" placeholder="Password"
                    class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">

                <button
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-lg font-semibold transition">
                    Send Request
                </button>

            </form>

            <p id="status" class="text-center mt-4 font-semibold"></p>

            <!-- REQUEST -->
            <div class="mt-6">
                <h3 class="text-sm text-gray-500 mb-1">Request JSON</h3>
                <pre id="requestJson"
                    class="bg-gray-100 text-gray-800 p-3 rounded-lg text-xs border border-gray-200 overflow-x-auto"></pre>
            </div>

            <!-- RESPONSE -->
            <div class="mt-4">
                <h3 class="text-sm text-gray-500 mb-1">Response JSON</h3>
                <pre id="responseJson"
                    class="bg-gray-100 text-gray-800 p-3 rounded-lg text-xs border border-gray-200 overflow-x-auto"></pre>
            </div>

        </div>

    </main>

</div>

<script>
document.getElementById("apiForm").addEventListener("submit", function(e){
    e.preventDefault();

    const u = username.value.trim();
    const p = password.value.trim();

    const req = { username: u, password: p };
    requestJson.textContent = JSON.stringify(req, null, 4);

    if(u.length < 3 || p.length < 6){
        status.innerHTML = "❌ Access Denied";
        status.className = "text-red-500 text-center mt-4 font-bold";

        responseJson.textContent = JSON.stringify({
            status:400,
            message:"Validation failed",
            access:false
        }, null, 4);
        return;
    }

    status.innerHTML = "✅ Access Granted";
    status.className = "text-green-600 text-center mt-4 font-bold";

    responseJson.textContent = JSON.stringify({
        status:200,
        message:"Authorized",
        access:true,
        stream:"camera-stream.mp4"
    }, null, 4);
});
</script>

</body>
</html>
