<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Camera Access API DTO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-xl bg-white p-8 rounded-2xl shadow-xl">

    <h2 class="text-2xl font-bold text-blue-700 text-center mb-6">
        📹 Camera Access REST API Simulation
    </h2>

    <form id="apiForm" class="space-y-4">

        <div>
            <label class="block font-semibold mb-1">Username</label>
            <input type="text" id="username"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>
        </div>

        <div>
            <label class="block font-semibold mb-1">Password</label>
            <input type="password" id="password"
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>
        </div>

        <button type="submit"
            class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 rounded-lg transition">
            Send API Request
        </button>
    </form>

    <p id="status" class="text-center mt-4 font-bold"></p>

    <div class="mt-6">
        <h3 class="font-semibold text-gray-700">📤 Request DTO JSON</h3>
        <pre id="requestJson" class="bg-gray-900 text-gray-200 p-4 rounded-lg text-sm mt-2"></pre>
    </div>

    <div class="mt-6">
        <h3 class="font-semibold text-gray-700">📥 Response DTO JSON</h3>
        <pre id="responseJson" class="bg-gray-900 text-gray-200 p-4 rounded-lg text-sm mt-2"></pre>
    </div>

</div>

<script>
document.getElementById("apiForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const status = document.getElementById("status");
    const requestOutput = document.getElementById("requestJson");
    const responseOutput = document.getElementById("responseJson");

    const requestDTO = {
        username: username,
        password: password
    };

    requestOutput.textContent = JSON.stringify(requestDTO, null, 4);

    if (username.length < 3 || password.length < 6) {
        const errorResponse = {
            status: 400,
            message: "Validation failed",
            accessGranted: false
        };

        status.innerHTML = "❌ Request failed";
        status.className = "text-red-500 text-center mt-4 font-bold";

        responseOutput.textContent = JSON.stringify(errorResponse, null, 4);
        return;
    }

    const responseDTO = {
        status: 200,
        message: "Access granted",
        accessGranted: true,
        streamUrl: "camera-stream.mp4",
        role: "AUTHORIZED_USER"
    };

    status.innerHTML = "✅ API request successful";
    status.className = "text-green-500 text-center mt-4 font-bold";

    responseOutput.textContent = JSON.stringify(responseDTO, null, 4);
});
</script>

</body>
</html>
