
<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alarm System - HTML Only</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.card {
    background-color: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
    text-align: center;
}

input {
    padding: 10px;
    width: 100%;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
    text-align: center;
}

button {
    padding: 10px;
    width: 100%;
    background-color: #2563eb;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
}
</style>
</head>
<body>

<div class="card">
    <h2>Алармена система</h2>
    <p>Въведете 4-цифров PIN код:</p>
    <form onsubmit="return checkPin(this)">
        <input type="password" placeholder="Въведете парола" maxlength="4" pattern="[0-9]{4}" required
            oninvalid="this.setCustomValidity('Пробвай ей тва 0000')"
            oninput="this.setCustomValidity('')">
        <button type="submit">Запази PIN</button>
    </form>
</div>
<form class="testClass" id="contactForm" method="get">
    <label for="username">Name:</label>
    <input type="text" id="username" name="username" placeholder="Enter your name">

    <label for="age">Age:</label>
    <input type="number" id="age" name="age" placeholder="Enter your age">

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter your password">

    <label for="passwordConfirm">Password Confirm:</label>
    <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="Enter your password">

    <button type="submit">Submit</button>
</form>
<script>
    function ShowMessage(info, type){
        alert("Result" + info);
    }
    document.getElementById('password').addEventListener('blur', function(event){
        event.preventDefault();

        let password = this.value;
        if(password.length < 8) {
            ShowMessage("Password is too short.");
            return;
        }
    })

    document.getElementById('passwordConfirm').addEventListener('blur', function(event){
        event.preventDefault();

        let password = document.getElementsById('password').value;
        let passwordConfirm = this.value;
        if(!(password === passwordConfirm)) {
            ShowMessage("Password did not match.");
            return;
        }
    })

    document.getElementById('contactForm').addEventListener('submit', function(event){
        event.preventDefault();
        let name = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        let age = document.getElementById('age').value;

        if(!name){
            ShowMessage("Name is missing.");
            return;
        }

        if(Number.isNaN(age) || age < 18 || age > 70) {
            ShowMessage("Age must be between 18 and 70.");
            return;
        }

</script>
</body>
</html>
