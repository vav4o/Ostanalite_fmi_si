<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home & IoT Security Dashboard</title>
<style>
    :root {
        --bg: #f6f8fc;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --border: rgba(15, 23, 42, 0.10);
        --shadow: 0 14px 30px rgba(2, 6, 23, 0.08);
        --primary: #2563eb;
        --primary-2: #1d4ed8;
        --ring: rgba(37, 99, 235, 0.35);
    }

    * { box-sizing: border-box; }

    body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        background: radial-gradient(1200px 700px at 10% 0%, #eaf1ff 0%, transparent 55%),
                    radial-gradient(900px 600px at 90% 10%, #e9fff5 0%, transparent 60%),
                    var(--bg);
        margin: 0;
        padding: 24px;
        color: var(--text);
    }

    .wrap {
        max-width: 1100px;
        margin: 0 auto;
    }

    /* Page header */
    .page-header {
        text-align: center;
        margin: 10px auto 16px;
    }

    .page-header h1 {
        margin: 0;
        font-size: clamp(22px, 3vw, 32px);
        letter-spacing: -0.02em;
    }

    .page-header .subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
    }

    /* Navigation */
    .nav {
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        gap: 10px;
        margin: 14px 0 22px;
        padding: 10px;
        background: rgba(255,255,255,0.65);
        border: 1px solid var(--border);
        border-radius: 14px;
        backdrop-filter: blur(8px);
    }

    .nav a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: #0b1220;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1;
        border: 1px solid rgba(255,255,255,0.12);
        transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
        min-width: 190px;
        justify-content: center;
        text-align: center;
        box-shadow: 0 0 0 3px transparent;
        flex: 1;
        white-space: nowrap;
    }

    .nav a:hover {
        transform: translateY(-1px);
        background: #111a2b;
    }

    .nav a.primary {
        background: var(--primary);
        border-color: rgba(255,255,255,0.18);
    }

    .nav a.primary:hover {
        background: var(--primary-2);
    }

    .nav a.active {
        box-shadow: 0 0 0 3px var(--ring);
    }

    /* Grid */
    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
    }

    .card {
        background: var(--surface);
        padding: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 22px rgba(2, 6, 23, 0.06);
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
        outline: none;
    }

    .card h2 {
        margin: 0 0 10px;
        font-size: 18px;
        letter-spacing: -0.01em;
    }

    .card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        border-color: rgba(37, 99, 235, 0.18);
    }

    .card.selected {
        background: #f0f7ff;
        border-color: rgba(37, 99, 235, 0.38);
        box-shadow: 0 18px 34px rgba(37, 99, 235, 0.14);
    }

    .card:focus-visible {
        box-shadow: 0 0 0 3px var(--ring), var(--shadow);
    }

    input {
        width: 100%;
        padding: 10px 12px;
        margin-top: 8px;
        margin-bottom: 10px;
        border-radius: 12px;
        border: 1px solid rgba(15, 23, 42, 0.14);
        background: #fff;
        font-size: 14px;
        outline: none;
        transition: box-shadow 0.12s ease, border-color 0.12s ease;
    }

    input:focus {
        border-color: rgba(37, 99, 235, 0.6);
        box-shadow: 0 0 0 3px var(--ring);
    }

    button {
        padding: 10px 12px;
        border: none;
        background: var(--primary);
        color: white;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    button:hover {
        transform: translateY(-1px);
        background: var(--primary-2);
        box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
    }

    .status {
        margin-top: 10px;
        font-weight: 700;
    }

    video {
        width: 100%;
        height: 200px;
        background: #000;
        border-radius: 12px;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="wrap">
    <div class="page-header">
        <h1>Smart Home & IoT Security Dashboard</h1>
        <p class="subtitle">You are on: Dashboard</p>
    </div>

    <nav class="nav" aria-label="Site navigation">
        <a class="primary active" aria-current="page" href="full_form.html">Home (Dashboard)</a>
        <a href="Index.html">📹 Security Camera</a>
        <a href="Automation.html">💡 Smart Lighting</a>
        <a href="">🚨 Alarm PIN Setup</a>
    </nav>

    <div class="container">

        <!-- Smart Lock -->
        <div class="card" tabindex="0">
            <h2>🔐 Smart Lock Control</h2>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button onclick="unlockDoor()">Unlock</button>
                <button onclick="lockDoor()">Lock</button>
            </div>
            <div class="status" id="lockStatus">Door is Locked</div>
        </div>

        <!-- Thermostat -->
        <div class="card" tabindex="0">
            <h2>🌡️ Thermostat Settings</h2>
            <input type="range" id="temperature" min="10" max="30" value="20">
            <div style="display:flex; justify-content:space-between; margin-top:6px; color: var(--muted); font-weight:700; font-size: 13px;">
                <span>10°C</span>
                <span id="tempValue">20°C</span>
                <span>30°C</span>
            </div>
            <button onclick="setTemperature()" style="margin-top:10px;">Set Temperature</button>
            <div class="status" id="tempStatus"></div>
        </div>

        <!-- Firmware Update -->
        <div class="card" tabindex="0">
            <h2>🛡️ Firmware Update</h2>
            <input type="text" id="signature" placeholder="Enter digital signature">
            <button onclick="verifyFirmware()">Verify & Update</button>
            <div class="status" id="firmwareStatus"></div>
        </div>

    </div>
</div>

<script>
    // Smart Lock
    function unlockDoor() {
        const el = document.getElementById("lockStatus");
        el.innerText = "Door Unlocked Successfully";
        el.style.color = "green";
    }

    function lockDoor() {
        const el = document.getElementById("lockStatus");
        el.innerText = "Door Locked";
        el.style.color = "red";
    }

    // Thermostat Validation
    function setTemperature() {
        let temp = parseInt(document.getElementById("temperature").value);
        let status = document.getElementById("tempStatus");

        if (temp >= 10 && temp <= 30) {
            status.innerText = "Temperature set to " + temp + "°C";
            status.style.color = "green";
        } else {
            status.innerText = "Invalid range! Allowed: 10-30°C";
            status.style.color = "red";
        }
    }

    // Keep slider value label in sync
    (function initTemperatureSlider() {
        const slider = document.getElementById('temperature');
        const value = document.getElementById('tempValue');
        if (!slider || !value) return;
        const sync = () => (value.textContent = slider.value + '°C');
        slider.addEventListener('input', sync);
        sync();
    })();

    // Firmware Signature Check
    function verifyFirmware() {
        let signature = document.getElementById("signature").value;
        let status = document.getElementById("firmwareStatus");

        const validSignature = "SECURE123SIGN";

        if (signature === validSignature) {
            status.innerText = "Digital signature valid. Firmware updated.";
            status.style.color = "green";
        } else {
            status.innerText = "Invalid signature! Update blocked.";
            status.style.color = "red";
        }
    }

    // Make cards selectable (click / Enter / Space)
    (function initSelectableCards() {
        const cards = Array.from(document.querySelectorAll('.card'));

        function setSelected(card) {
            cards.forEach(c => c.classList.toggle('selected', c === card));
        }

        cards.forEach(card => {
            card.addEventListener('click', (e) => {
                // Ignore clicks on interactive controls inside the card
                if (e.target.closest('button, input, select, textarea, a, video')) return;
                setSelected(card);
            });

            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    setSelected(card);
                }
            });
        });
    })();
</script>

</body>
</html>
