<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home & IoT Security Dashboard</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
        padding: 10px 15px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 8px;
        margin-bottom: 10px;
    }

    .status {
        margin-top: 10px;
        font-weight: bold;
    }

    video {
        width: 100%;
        height: 200px;
        background: black;
    }
</style>
</head>
<body>

<h1>Smart Home & IoT Security Dashboard</h1>

<div class="container">

    <!-- Smart Lock -->
    <div class="card">
        <h2>🔐 Smart Lock Control</h2>
        <button onclick="unlockDoor()">Remote Unlock</button>
        <div class="status" id="lockStatus">Door is Locked</div>
    </div>

    <!-- Thermostat -->
    <div class="card">
        <h2>🌡️ Thermostat Settings</h2>
        <input type="number" id="temperature" placeholder="Enter temperature (10-30)">
        <button onclick="setTemperature()">Set Temperature</button>
        <div class="status" id="tempStatus"></div>
    </div>

    <!-- Firmware Update -->
    <div class="card">
        <h2>🛡️ Firmware Update</h2>
        <input type="text" id="signature" placeholder="Enter digital signature">
        <button onclick="verifyFirmware()">Verify & Update</button>
        <div class="status" id="firmwareStatus"></div>
    </div>

    <!-- Alarm System -->
    <div class="card">
        <h2>🚨 Alarm PIN Setup</h2>
        <input type="password" id="pinCode" placeholder="Enter 4-digit PIN">
        <button onclick="setPIN()">Set PIN</button>
        <div class="status" id="pinStatus"></div>
    </div>

    <!-- Smart Lighting -->
    <div class="card">
        <h2>💡 Smart Lighting</h2>
        <input type="time" id="lightTime">
        <button onclick="scheduleLight()">Schedule</button>
        <div class="status" id="lightStatus"></div>
    </div>

    <!-- Camera -->
    <div class="card">
        <h2>📹 Security Camera</h2>
        <input type="password" id="cameraPassword" placeholder="Enter access password">
        <button onclick="authorizeCamera()">Access Stream</button>
        <video id="cameraStream" controls style="display:none;">
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
        <div class="status" id="cameraStatus"></div>
    </div>

</div>

<script>
    // Smart Lock
    function unlockDoor() {
        document.getElementById("lockStatus").innerText = "Door Unlocked Successfully";
    }

    // Thermostat Validation
    function setTemperature() {
        let temp = parseInt(document.getElementById("temperature").value);
        let status = document.getElementById("tempStatus");

        if (temp >= 10 && temp <= 30) {
            status.innerText = "Temperature set to " + temp + "°C";
            status.style.color = "green";
        } else {
            status.innerText = "Invalid range! Allowed: 10-30°C";
            status.style.color = "red";
        }
    }

    // Firmware Signature Check
    function verifyFirmware() {
        let signature = document.getElementById("signature").value;
        let status = document.getElementById("firmwareStatus");

        const validSignature = "SECURE123SIGN";

        if (signature === validSignature) {
            status.innerText = "Digital signature valid. Firmware updated.";
            status.style.color = "green";
        } else {
            status.innerText = "Invalid signature! Update blocked.";
            status.style.color = "red";
        }
    }

    // PIN Validation
    function setPIN() {
        let pin = document.getElementById("pinCode").value;
        let status = document.getElementById("pinStatus");

        if (/^\d{4}$/.test(pin)) {
            status.innerText = "PIN successfully set.";
            status.style.color = "green";
        } else {
            status.innerText = "PIN must be exactly 4 digits.";
            status.style.color = "red";
        }
    }

    // Lighting Schedule
    function scheduleLight() {
        let time = document.getElementById("lightTime").value;
        let status = document.getElementById("lightStatus");

        if (time) {
            status.innerText = "Light scheduled at " + time;
            status.style.color = "green";
        } else {
            status.innerText = "Please select a valid time.";
            status.style.color = "red";
        }
    }

    // Camera Authorization
    function authorizeCamera() {
        let password = document.getElementById("cameraPassword").value;
        let video = document.getElementById("cameraStream");
        let status = document.getElementById("cameraStatus");

        const accessPassword = "admin123";

        if (password === accessPassword) {
            video.style.display = "block";
            video.play();
            status.innerText = "Access granted.";
            status.style.color = "green";
        } else {
            video.style.display = "none";
            status.innerText = "Unauthorized access!";
            status.style.color = "red";
        }
    }
</script>

</body>
</html>
