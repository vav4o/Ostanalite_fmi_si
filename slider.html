<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aligned Slider</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --surface: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.10);
      --shadow: 0 14px 30px rgba(2, 6, 23, 0.08);
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --ring: rgba(37, 99, 235, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 10% 0%, #eaf1ff 0%, transparent 55%),
                  radial-gradient(900px 600px at 90% 10%, #e9fff5 0%, transparent 60%),
                  var(--bg);
      margin: 0;
      padding: 24px;
      color: var(--text);
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Page header */
    .page-header {
      text-align: center;
      margin: 10px auto 16px;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.02em;
    }

    .page-header .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    /* Navigation */
    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 14px 0 22px;
      padding: 10px;
      background: rgba(255,255,255,0.65);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(8px);
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0b1220;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1;
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #111a2b;
    }

    .nav a.primary {
      background: var(--primary);
      border-color: rgba(255,255,255,0.18);
    }

    .nav a.primary:hover {
      background: var(--primary-2);
    }

    .nav a.active {
      box-shadow: 0 0 0 3px var(--ring);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 22px rgba(2, 6, 23, 0.06);
      max-width: 520px;
      margin: 0 auto;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--primary);
    }

    .value {
      width: 44px;
      text-align: right;
      font-weight: 800;
      color: var(--text);
    }

    label {
      color: var(--muted);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="page-header">
      <h1>Aligned Slider</h1>
      <p class="subtitle">You are on: Slider</p>
    </div>

    <nav class="nav" aria-label="Site navigation">
      <a class="primary" href="full_form.html">Back to Dashboard</a>
      <a href="Index.html">📹 Security Camera</a>
      <a href="Automation.html">💡 Smart Lighting</a>
      <a href="cyberSecurity.html">🚨 Alarm PIN Setup</a>
    </nav>

    <div class="panel">
      <div class="container">
        <label for="range">Value:</label>
        <input type="range" id="range" min="0" max="100" value="50">
        <span class="value" id="value">50</span>
      </div>
    </div>
  </div>

  <script>
    const slider = document.getElementById("range");
    const output = document.getElementById("value");

    slider.addEventListener("input", () => {
      output.textContent = slider.value;
    });
  </script>

</body>
</html>
