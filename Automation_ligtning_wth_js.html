<!DOCTYPE html>
<html>
<head>
    <title>Умно осветление: Графици и автоматизация</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }

        .form-group {
            max-width: 400px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="time"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            background-color: #fff;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
            outline: none;
        }

        /* Fix invalid style */
        input:invalid,
        textarea:invalid,
        select:invalid {
            border-color: #c1cad8;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            margin-bottom: 6px;
            cursor: pointer;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 6px;
            transform: scale(1.2);
            cursor: pointer;
        }

        button {
            width: 50%;
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h1>Умно осветление: Графици и автоматизация</h1>

    <form id="SmartLightingForm">
        <div class="form-group">
            <label for="zoneName">Име на зона / стая</label>
            <input 
                id="zoneName" 
                name="zoneName" 
                type="text" 
                placeholder="напр. Хол, Спалня" 
                required>
        </div>

        <div class="form-group">
            <label for="deviceId">Изберете лампа / устройство</label>
            <select id="deviceId" name="deviceId">
                <option value="">-- Изберете лампа --</option>
                <option value="lamp-living-1">Хол - Лампа 1</option>
                <option value="lamp-living-2">Хол - Лампа 2</option>
                <option value="lamp-bedroom-1">Спалня - Лампа 1</option>
                <option value="lamp-kitchen-1">Кухня - Основна лампа</option>
                <option value="lamp-corridor-1">Коридор - Лампа</option>
                <option value="lamp-bathroom-1">Баня - Лампа</option>
            </select>
            <small id="deviceError" style="color:red; display:none;">Моля, изберете лампа.</small>
        </div>

        <div class="form-group">
            <label for="startTime">Час на включване</label>
            <input id="startTime" name="startTime" type="time" placeholder="HH:MM">
            <small id="timeErrorStart" style="color:red; display:none;">Моля, въведете час на включване.</small>
        </div>

        <div class="form-group">
            <label for="endTime">Час на изключване</label>
            <input id="endTime" name="endTime" type="time" placeholder="HH:MM">
            <small id="timeErrorEnd" style="color:red; display:none;">Моля, въведете час на изключване.</small>
        </div>

        <div class="form-group">
            <label for="days">Дни от седмицата</label>
            <div class="options" id="days-group">
                <label><input type="checkbox" name="days" value="mon"> Понеделник</label>
                <label><input type="checkbox" name="days" value="tue"> Вторник</label>
                <label><input type="checkbox" name="days" value="wed"> Сряда</label>
                <label><input type="checkbox" name="days" value="thu"> Четвъртък</label>
                <label><input type="checkbox" name="days" value="fri"> Петък</label>
                <label><input type="checkbox" name="days" value="sat"> Събота</label>
                <label><input type="checkbox" name="days" value="sun"> Неделя</label>
            </div>
            <small id="days-error" style="color:red; display:none;">Моля, изберете поне един ден от седмицата.</small>
        </div>

        <div class="form-group">
            <label for="brightness">Яркост (%)</label>
            <input id="brightness" name="brightness" type="number" min="1" max="100">
        </div>

        <div class="form-group">
            <label for="mode">Режим на осветление</label>
            <select id="mode" name="mode">
                <option value="">-- Изберете режим --</option>
                <option value="normal">Стандартен</option>
                <option value="eco">Икономичен</option>
                <option value="night">Нощен</option>
            </select>
            <small id="deviceError" style="color:red; display:none;">Моля, изберете лампа.</small>
        </div>

        <div class="form-group">
            <label for="motionSensor">Сензор за движение</label>
            <div class="options">
                <label>
                    <input type="radio" name="motionSensor" value="enabled" checked>
                    Активиран
                </label>
                <label>
                    <input type="radio" name="motionSensor" value="disabled">
                    Деактивиран
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="notes">Допълнителни бележки</label>
            <textarea id="notes" name="notes" placeholder="Описания на сценарии, условия за сигурност и др."></textarea>
        </div>

        <button type="submit">Запази графика</button>
    </form>

    <script>
        document.getElementById('SmartLightingForm').addEventListener('submit', function(event) {
    const select = document.getElementById('deviceId');
    const error = document.getElementById('deviceError');

    if (select.value === "") {
        error.style.display = "block"; // show error
        select.focus();
        event.preventDefault(); // stop form submission
    } else {
        error.style.display = "none"; // hide error if valid
    }
});
document.getElementById('SmartLightingForm').addEventListener('submit', function(event) {
    const timeInput = document.getElementById('startTime');
    const error = document.getElementById('timeErrorStart');

    // Check if the input is empty or not in HH:MM format
    const timeValue = timeInput.value.trim();

    if (timeValue === "" || !/^\d{2}:\d{2}$/.test(timeValue)) {
        error.style.display = "block"; // show error
        timeInput.focus();
        event.preventDefault(); // prevent form submission
    } else {
        error.style.display = "none"; // hide error
    }
});

// Hide error immediately when user selects a valid time
document.getElementById('startTime').addEventListener('input', function() {
    const error = document.getElementById('timeErrorStart');
    if (this.value.trim() !== "") {
        error.style.display = "none";
    }
});


document.getElementById('SmartLightingForm').addEventListener('submit', function(event) {
    const timeInput = document.getElementById('endTime');
    const error = document.getElementById('timeErrorEnd');

    // Check if the input is empty or not in HH:MM format
    const timeValue = timeInput.value.trim();

    if (timeValue === "" || !/^\d{2}:\d{2}$/.test(timeValue)) {
        error.style.display = "block"; // show error
        timeInput.focus();
        event.preventDefault(); // prevent form submission
    } else {
        error.style.display = "none"; // hide error
    }
});

// Hide error immediately when user selects a valid time
document.getElementById('endTime').addEventListener('input', function() {
    const error = document.getElementById('timeErrorEnd');
    if (this.value.trim() !== "") {
        error.style.display = "none";
    }
});

function ShowMessage(info, type){
        alert("Result" + info);
    }
        const form = document.getElementById('SmartLightingForm');
        const daysError = document.getElementById('days-error');

        form.addEventListener('submit', function (event) {
            const checkedDays = document.querySelectorAll('input[name="days"]:checked');
            if (checkedDays.length === 0) {
                event.preventDefault();
                daysError.style.display = 'block';
            } else {
                daysError.style.display = 'none';
            }
        });

        document.getElementById('SmartLightingForm').addEventListener('submit', function(event){
            event.preventDefault();
            let brightness = document.getElementById('brightness').value;

            if(brightness < 1 || brightness > 100) {
                ShowMessage("Brightness must be between 1 and 100.   " + brightness);
                return;
            }
        })

    document.getElementById('SmartLightingForm').addEventListener('submit', function(event) {
        const select = document.getElementById('mode');
        const error = document.getElementById('deviceError');

    if (select.value === "") {
        error.style.display = "block"; // show error
        select.focus();
        event.preventDefault(); // stop form submission
    } else {
        error.style.display = "none"; // hide error if valid
    }
});
    </script>
</body>
</html>
